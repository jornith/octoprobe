[tool.ruff]
target-version = "py311"
line-length = 100

[tool.ruff.lint]
select = ["E", "F", "W", "I", "UP", "B", "SIM", "C4"]

[tool.ruff.lint.isort]
known-first-party = ["src", "tests"]

[tool.pytest.ini_options]
testpaths = ["tests"]
pythonpath = ["."]
addopts = "-ra --strict-markers"
log_level = "INFO"
markers = [
    "smoke: critical-path checks, run on every push",
    "regression: full suite, scheduled nightly",
    "contract: consumer-driven contract tests (pact)",
    "negative: invalid input and error handling scenarios",
    "rate_limit: rate limiting behaviour",
]
